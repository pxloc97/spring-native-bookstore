apiVersion: v1
kind: ConfigMap
metadata:
  name: catalog-service
  labels:
    spring.cloud.kubernetes.config: "true"
data:
  application.yml: |
    spring:
      config:
        import: optional:configserver:,configtree:/workspace/secrets/*/
      cloud:
        config:
          uri: http://config-service
        datasource:
          url: jdbc:postgresql://polar-postgres-catalog/polardb_catalog
