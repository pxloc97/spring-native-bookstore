apiVersion: apps/v1
kind: Deployment
metadata:
  name: polar-kafka
  labels:
    app: polar-kafka
spec:
  selector:
    matchLabels:
      app: polar-kafka
  template:
    metadata:
      labels:
        app: polar-kafka
    spec:
      containers:
        - name: polar-kafka
          image: apache/kafka:4.2.0
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          ports:
            - containerPort: 19092
            - containerPort: 29093
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@polar-kafka:29093"
            - name: KAFKA_LISTENERS
              value: "CONTROLLER://:29093,PLAINTEXT://:19092"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://polar-kafka:19092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS
              value: "0"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR
              value: "1"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: kafka-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: polar-kafka
  labels:
    app: polar-kafka
spec:
  type: ClusterIP
  selector:
    app: polar-kafka
  ports:
    - name: broker
      protocol: TCP
      port: 19092
      targetPort: 19092
