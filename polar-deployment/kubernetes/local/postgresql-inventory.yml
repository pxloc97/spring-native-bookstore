apiVersion: apps/v1
kind: Deployment
metadata:
  name: polar-postgres-inventory
  labels:
    db: polar-postgres-inventory
spec:
  selector:
    matchLabels:
      db: polar-postgres-inventory
  template:
    metadata:
      labels:
        db: polar-postgres-inventory
    spec:
      containers:
        - name: polar-postgres-inventory
          image: postgres:14.12
          env:
            - name: POSTGRES_USER
              value: user
            - name: POSTGRES_PASSWORD
              value: password
            - name: POSTGRES_DB
              value: polardb_inventory
          resources:
            requests:
              cpu: 100m
              memory: 60Mi
            limits:
              cpu: 200m
              memory: 120Mi

---

apiVersion: v1
kind: Service
metadata:
  name: polar-postgres-inventory
  labels:
    db: polar-postgres-inventory
spec:
  type: ClusterIP
  selector:
    db: polar-postgres-inventory
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
