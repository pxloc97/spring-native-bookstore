name: CD Pipeline
on:
  push:
    branches: [main]

jobs:
  config-service-build:
    uses: ./.github/workflows/ci-config-pipeline.yml
    secrets: inherit

  catalog-service-build:
    uses: ./.github/workflows/ci-catalog-pipeline.yml
    secrets: inherit

  order-service-build:
    uses: ./.github/workflows/ci-order-pipeline.yml
    secrets: inherit

  edge-service-build:
    uses: ./.github/workflows/ci-edge-pipeline.yml
    secrets: inherit

  dispatcher-service-build:
    uses: ./.github/workflows/ci-dispatcher-pipeline.yml
    secrets: inherit
