apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: edge-service
  labels:
    app: edge-service
spec:
  ingressClassName: nginx
  rules:
    - host: edge.bookstore.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: edge-service
                port:
                  number: 80
