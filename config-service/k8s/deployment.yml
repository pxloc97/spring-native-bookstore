apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  labels:
    app: config-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
    spec:
      containers:
        - name: config-service
          image: pxloc97/config-service:0.0.1-SNAPSHOT
          imagePullPolicy: IfNotPresent
          lifecycle:
            preStop:
              exec:
                command: [ "sh", "-c", "sleep 5" ]
          ports:
            - containerPort: 8888
          env:
            - name: BPL_JVM_THREAD_COUNT
              value: "50"
          volumeMounts:
            - name: config-service-volume
              mountPath: /workspace/config
            - name: config-service-volume-secret
              mountPath: /workspace/secrets/config-service
              readOnly: true
      volumes:
        - name: config-service-volume
          configMap:
            name: config-service
        - name: config-service-volume-secret
          secret:
            secretName: config-service
