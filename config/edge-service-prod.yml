spring:
  data:
    redis:
      host: polar-redis
      port: 6379
  security:
    oauth2:
      client:
        provider:
          keycloak:
            issuer-uri: http://polar-keycloak:8080/realms/PolarBookshop
  cloud:
    config:
      bus:
        enabled: true
    gateway:
      server:
        webflux:
          default-filters:
            - SaveSession
            - TokenRelay
          routes:
            - id: spa-route
              uri: http://polar-ui:9004
              predicates:
                - Path=/,/*.css,/*.js,/favicon.ico
            - id: catalog-route
              uri: http://catalog-service:9001
              predicates:
                - Path=/books,/books/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: catalogCircuitBreaker
                    fallbackUri: forward:/catalog-fallback
            - id: order-route
              uri: http://order-service:9002
              predicates:
                - Path=/orders,/orders/**
              filters:
                - name: CircuitBreaker
                  args:
                    name: orderCircuitBreaker
